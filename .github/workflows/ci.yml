name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check logic_brain/ tests/ tools/

      - name: Type check (mypy strict)
        run: python -m mypy --strict logic_brain

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Coverage gate
        if: matrix.python-version == '3.12'
        run: pytest --cov=logic_brain --cov-report=term-missing --cov-report=xml --cov-fail-under=85

      - name: Metamorphic gate
        if: matrix.python-version == '3.12'
        run: pytest -q -m metamorphic

      - name: Upload coverage report
        if: matrix.python-version == '3.12' && always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

      - name: Benchmark regression gate
        run: python tools/check_results.py exam
