[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "logic-brain"
version = "0.1.1"
description = "LLM × Deterministic Logic Verifier — exploiting the P≠NP asymmetry"
requires-python = ">=3.10"
dependencies = [
    "z3-solver>=4.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "hypothesis>=6.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.setuptools.packages.find]
include = ["logic_brain*"]
